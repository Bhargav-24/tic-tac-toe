<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="game-page">

    <div class="scanlines"></div>
    <div class="grid-bg"></div>

    <div class="game-container">

        <!-- LEFT PANEL - Scores -->
        <div class="left-panel">
            <div class="scores">
                <div class="score-card p1-card">
                    <span class="score-label">P1</span>
                    <span class="score-symbol x-symbol">X</span>
                    <span class="score-value" id="p1score">0</span>
                </div>
                <div class="score-card p2-card">
                    <span class="score-label">P2</span>
                    <span class="score-symbol o-symbol">O</span>
                    <span class="score-value" id="p2score">0</span>
                </div>
            </div>
            <button id="reset" class="btn btn-small">↺ RESET</button>
        </div>

        <!-- CENTER PANEL - Board -->
        <div class="center-panel">
            <h2 id="turn" class="turn-text"></h2>
            <div class="board-wrapper">
                <div class="board"></div>
            </div>
            <h2 id="result" class="result-text"></h2>
            <div class="bottom-buttons">
                <button id="playagain" class="btn">▶ PLAY AGAIN</button>
                <a href="/" class="btn btn-ghost">← BACK</a>
            </div>
        </div>

    </div>

    <script src="logic.js"></script>
    <script src="script.js"></script>
    <footer class="site-footer">
        Contact <a href="mailto:jbhargavagopal@gmail.com">jbhargavagopal@gmail.com</a> for any issues
    </footer>
</body>
</html>
